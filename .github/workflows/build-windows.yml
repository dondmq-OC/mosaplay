name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install SDL2 via vcpkg
        run: vcpkg install sdl2:x64-windows

      - name: Download mpv
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force windows-deps | Out-Null
          Set-Location windows-deps
          # SourceForge with browser UA to avoid redirect page
          curl.exe -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" -o mpv.7z "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-20250216.7z/download"
          # Check if it's a valid archive
          $size = (Get-Item mpv.7z).Length
          Write-Host "Downloaded: $size bytes"
          if ($size -lt 10000) {
            Write-Host "Download too small, dumping content:"
            Get-Content mpv.7z -Raw
            exit 1
          }
          7z x mpv.7z -y
          $dir = Get-ChildItem -Directory -Filter "mpv-dev*" | Select-Object -First 1
          if ($dir) {
            Set-Location $dir.FullName
            if (Test-Path libmpv-2.def) {
              lib /def:libmpv-2.def /machine:x64 /out:mpv.lib
            }
            Copy-Item mpv-2.dll ..
            if (Test-Path mpv.lib) { Copy-Item mpv.lib .. }
            Set-Location ..\..
          } else {
            Write-Error "mpv extraction failed"
            Get-ChildItem
            exit 1
          }

      - name: Build
        env:
          RUSTFLAGS: "-L native=${{ github.workspace }}/windows-deps -L native=C:/vcpkg/installed/x64-windows/lib"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force GridPlayer-win64 | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\gridplayer.exe GridPlayer-win64\
          Copy-Item windows-deps\mpv-2.dll GridPlayer-win64\
          Copy-Item C:\vcpkg\installed\x64-windows\bin\SDL2.dll GridPlayer-win64\
          "GridPlayer Windows Portable" | Out-File GridPlayer-win64\README.txt
          "Run: gridplayer.exe video1.mp4 video2.mp4 ..." | Out-File GridPlayer-win64\README.txt -Append
          "No installation needed — just unzip and run." | Out-File GridPlayer-win64\README.txt -Append
          Get-ChildItem GridPlayer-win64
          7z a GridPlayer-win64.zip GridPlayer-win64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridPlayer-win64
          path: GridPlayer-win64.zip
