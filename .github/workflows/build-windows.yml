name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/build-windows.yml') }}

      - name: Install SDL2 + mpv via vcpkg
        run: |
          vcpkg install sdl2:x64-windows mpv:x64-windows
          # Let Rust find vcpkg libs
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV

      - name: Build
        env:
          RUSTFLAGS: "-L native=C:/vcpkg/installed/x64-windows/lib"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Collect DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force GridPlayer-win64 | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\gridplayer.exe GridPlayer-win64\
          # Copy required DLLs from vcpkg
          Copy-Item C:\vcpkg\installed\x64-windows\bin\mpv-2.dll GridPlayer-win64\  -ErrorAction SilentlyContinue
          Copy-Item C:\vcpkg\installed\x64-windows\bin\SDL2.dll GridPlayer-win64\   -ErrorAction SilentlyContinue
          # Try alternative paths
          $mpvDll = Get-ChildItem -Path C:\vcpkg\installed -Recurse -Filter "mpv*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          $sdlDll = Get-ChildItem -Path C:\vcpkg\installed -Recurse -Filter "SDL2.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($mpvDll) { Copy-Item $mpvDll.FullName GridPlayer-win64\ }
          if ($sdlDll) { Copy-Item $sdlDll.FullName GridPlayer-win64\ }
          # Write README
          "GridPlayer Windows Portable" | Out-File GridPlayer-win64\README.txt
          "Run: gridplayer.exe video1.mp4 video2.mp4 ..." | Out-File GridPlayer-win64\README.txt -Append
          "No installation needed — just unzip and run." | Out-File GridPlayer-win64\README.txt -Append
          # List contents
          Get-ChildItem GridPlayer-win64

      - name: Package
        run: 7z a GridPlayer-win64.zip GridPlayer-win64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridPlayer-win64
          path: GridPlayer-win64.zip
