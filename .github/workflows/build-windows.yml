name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install SDL2 via vcpkg
        run: vcpkg install sdl2:x64-windows

      - name: Download mpv (latest from GitHub releases)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force windows-deps | Out-Null
          Set-Location windows-deps
          # Get latest release from shinchiro/mpv-winbuild-cmake
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" -Headers @{Accept="application/vnd.github+json"}
          $asset = $release.assets | Where-Object { $_.name -match 'mpv-dev-x86_64-' -and $_.name -notmatch 'v3' } | Select-Object -First 1
          Write-Host "Downloading: $($asset.name) ($([math]::Round($asset.size/1MB,1))MB)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z
          7z x mpv.7z -y
          # Find the DLL and .def (directory structure varies)
          $dll = Get-ChildItem -Recurse -Filter "*.dll" | Where-Object { $_.Name -match 'mpv.*\.dll' } | Select-Object -First 1
          $def = Get-ChildItem -Recurse -Filter "*.def" | Where-Object { $_.Name -match 'mpv' } | Select-Object -First 1
          Write-Host "Found DLL: $($dll.FullName)"
          Write-Host "Found DEF: $($def.FullName)"
          if ($def) {
            Push-Location $def.DirectoryName
            lib /def:$($def.Name) /machine:x64 /out:mpv.lib
            Pop-Location
          }
          if ($dll) { Copy-Item $dll.FullName . }
          # Copy .lib if generated
          $lib = Get-ChildItem -Recurse -Filter "mpv.lib" | Select-Object -First 1
          if ($lib) { Copy-Item $lib.FullName . }
          Set-Location ..

      - name: Build
        env:
          RUSTFLAGS: "-L native=${{ github.workspace }}/windows-deps -L native=C:/vcpkg/installed/x64-windows/lib"
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force GridPlayer-win64 | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\gridplayer.exe GridPlayer-win64\
          Copy-Item windows-deps\libmpv-2.dll GridPlayer-win64\
          Copy-Item C:\vcpkg\installed\x64-windows\bin\SDL2.dll GridPlayer-win64\
          "GridPlayer Windows Portable" | Out-File GridPlayer-win64\README.txt
          "Run: gridplayer.exe video1.mp4 video2.mp4 ..." | Out-File GridPlayer-win64\README.txt -Append
          "No installation needed — just unzip and run." | Out-File GridPlayer-win64\README.txt -Append
          Get-ChildItem GridPlayer-win64
          7z a GridPlayer-win64.zip GridPlayer-win64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GridPlayer-win64
          path: GridPlayer-win64.zip
